version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_DB=0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/marriage_gifts
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-noreply@marriagegifts.com}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@marriagegifts.com}
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=marriage_gifts
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
